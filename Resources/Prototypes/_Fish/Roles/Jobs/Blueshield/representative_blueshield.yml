   outerClothing: ClothingOuterArmorBlueShield
   id: BlueShieldOperativePDA
   ears: ClothingHeadsetCommand
   gloves: ClothingHandsGlovesCombat
  storage:
   back:
   - HandheldBSOCrewMonitor
