- type: entity
  parent: BaseItem
  id: BatNT
  name: Tactical bat
  decription: A bat made especially for important people. Well suited for repelling attacks.
  components:
  - type: ItemToggle
    soundActivate:
      collection: sparks
      params:
        variation: 0.250
    soundDeactivate:
      collection: sparks
      params:
        variation: 0.250
    soundFailToActivate:
      path: /Audio/Machines/button.ogg
      params:
        variation: 0.250
  - type: ItemToggleSize
    activatedSize: Normal
    activatedShape:
    - 0,0,1,2
  - type: DisarmMalus
    malus: 0.225
  - type: Sprite
    sprite: _Fish/Objects/Weapons/Melee/BatNT.rsi
    layers:
    - state: telebaton_off
      map: [ "enum.ToggleableVisuals.Layer" ]
  - type: ItemToggleMeleeWeapon
    activatedDamage:
      types:
        Blunt: 0
  - type: MeleeWeapon
    attackRate: 1
    wideAnimationRotation: -135
    damage:
      types:
        Blunt: 10
    bluntStaminaDamageFactor: 2.0
  - type: Telescopicbaton
  - type: StaminaDamageOnHit
    damage: 40
    sound: /Audio/Weapons/egloves.ogg
  - type: UseDelay
    delay: 0.4
  - type: Item
    sprite: _Fish/Objects/Weapons/Melee/BatNT.rsi
    size: Normal
    shape:
    - 0,0,1,1
  - type: Appearance
  - type: GenericVisualizer
    visuals:
     enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: {state: telebaton_on}
          False: {state: telebaton_off}
  - type: StaticPrice
    price: 100
  - type: SolutionContainerManager
    solutions:
      battery:
        maxVol: 5
  - type: InjectableSolution
    solution: battery
  - type: DrawableSolution
    solution: battery
  - type: Battery
    maxCharge: 975
    startingCharge: 975
  - type: Stunbaton
    energyPerUse: 65
  - type: MeleeThrowOnHit
    distance: 0.2
    speed: 10